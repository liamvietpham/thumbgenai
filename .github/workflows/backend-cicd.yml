name: Deploy Thumbgen AI Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/src/**'
      - 'backend/test/**'
      - 'backend/package.json'
      - 'backend/yarn.lock'
      - 'backend/serverless.yml'
      - 'backend/nest-cli.json'
      - 'backend/tsconfig*.json'
      - 'backend/eslint.config.mjs'
      - .github/workflows/backend-cicd.yml
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Install dependencies
        env:
          HUSKY: 0
        run: yarn install --frozen-lockfile

      - name: Run lint
        run: yarn lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Install dependencies
        env:
          HUSKY: 0
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test --runInBand

  test-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Install dependencies
        env:
          HUSKY: 0
        run: yarn install --frozen-lockfile

      - name: Run e2e tests
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: yarn test:e2e --runInBand

  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Install dependencies
        env:
          HUSKY: 0
        run: yarn install --frozen-lockfile

      - name: Run typecheck
        run: yarn typecheck

  deploy:
    name: Deploy backend to AWS Lambda
    needs:
      - lint
      - test
      - test-e2e
      - typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Install dependencies
        env:
          HUSKY: 0
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Detect backend infrastructure changes
        id: infra-changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.before }}"
          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files=$(git diff --name-only "$base_sha" "$GITHUB_SHA")
          echo "Changed files:"
          echo "$changed_files"

          if echo "$changed_files" | grep -Eq '(serverless\.yml|backend-cicd\.yml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Lambda code
        if: steps.infra-changes.outputs.changed != 'true'
        run: yarn serverless deploy function --function api --stage prod --region "$AWS_REGION"

      - name: Deploy full stack
        if: steps.infra-changes.outputs.changed == 'true'
        run: yarn deploy:prod --region "$AWS_REGION" --verbose
